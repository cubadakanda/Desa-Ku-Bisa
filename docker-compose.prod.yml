version: "3.8"

services:
  backend:
    image: ${{ secrets.DOCKERHUB_USERNAME }}/desa-ku-bisa-backend:latest
    container_name: desa-ku-bisa-backend-prod
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME}
      CORS_ORIGIN: https://${DOMAIN}
    restart: unless-stopped
    networks:
      - desa-network

  frontend:
    image: ${{ secrets.DOCKERHUB_USERNAME }}/desa-ku-bisa-frontend:latest
    container_name: desa-ku-bisa-frontend-prod
    ports:
      - "80:80"
      - "443:443"
    environment:
      VITE_API_URL: https://${DOMAIN}/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - desa-network
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro

networks:
  desa-network:
    driver: bridge
