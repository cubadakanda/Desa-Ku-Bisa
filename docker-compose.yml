version: "3.8"

services:
  # MySQL Database (untuk development lokal, gunakan RDS di production)
  db:
    image: mysql:8
    container_name: desa-ku-bisa-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: desa_ku_bisa
      MYSQL_USER: desa_user
      MYSQL_PASSWORD: desa_password
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - desa-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desa-ku-bisa-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: desa_user
      DB_PASSWORD: desa_password
      DB_NAME: desa_ku_bisa
      JWT_SECRET: desa-ku-bisa-secret-key
      AWS_REGION: ap-southeast-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME}
      CORS_ORIGIN: http://localhost:5173,http://localhost:80
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - desa-network

  # Frontend Web
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: desa-ku-bisa-frontend
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - desa-network

volumes:
  db-data:

networks:
  desa-network:
    driver: bridge
